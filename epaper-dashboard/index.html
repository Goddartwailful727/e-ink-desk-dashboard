<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=800, height=480, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>E-paper Dashboard</title>
    <link rel="stylesheet" href="/epaper/styles.css">
    <script src="/epaper/script.js" defer></script>
  </head>
  <body>
    <main class="dashboard" aria-label="800 by 480 e-paper dashboard">
      <section class="top-strip" aria-label="status strip">
        <article class="card today-card" aria-labelledby="today-title">
          <div class="top-label" id="today-title">TODAY</div>
          <div class="today-body">
            <div class="date-day" id="date-day">02</div>
            <div class="date-meta">
              <div id="date-weekday">星期二</div>
              <div><span id="date-year">2026</span>/<span id="date-month">06</span></div>
            </div>
          </div>
        </article>

        <article class="card mantra-card" aria-label="daily quote">
          <div class="mantra-text" id="daily-quote">
            <span>纸上得来终觉浅，绝知此事要躬行。</span>
          </div>
        </article>

        <article class="card updated-card" aria-labelledby="updated-title">
          <div class="top-label" id="updated-title">UPDATED</div>
          <time class="updated-time" id="updated-time" datetime="08:30">08:30</time>
        </article>
      </section>

      <section class="main-grid" aria-label="dashboard panels">
        <article class="card weather-mouse-card" aria-label="weather and pixel mouse">
          <section class="weather-panel" aria-labelledby="weather-title">
            <h1 class="card-title" id="weather-title">天气</h1>

              <div class="weather-location" id="weather-location">北京</div>
              <div class="weather-temp" id="weather-temp">27°C</div>
              <div class="weather-summary" id="weather-summary">多云转晴</div>
              <dl class="weather-facts">
                <div>
                  <dt>体感</dt>
                  <dd id="weather-feels">29°C</dd>
                </div>
                <div>
                  <dt>降雨</dt>
                  <dd id="weather-rain">10%</dd>
                </div>
                <div>
                  <dt>风</dt>
                  <dd id="weather-wind">东南 3 级</dd>
                </div>
                <div>
                  <dt>AQI</dt>
                  <dd id="weather-aqi">42</dd>
                </div>
              </dl>
            </div>
          </section>

          <div id="schedule-list" class="schedule-list" aria-live="polite"></div>
        </article>
